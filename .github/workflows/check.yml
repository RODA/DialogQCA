name: Check product

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out product
        uses: actions/checkout@v4

      - name: Check out DialogForge
        uses: actions/checkout@v4
        with:
          repository: RODA/DialogForge
          path: DialogForge

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DialogForge/package-lock.json

      - name: Install DialogForge dependencies
        working-directory: DialogForge
        run: npm ci

      - name: Check product contribution
        run: npm run check
